<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>川维化工 AI 智能体平台</title>
<script src="https://cdn.jsdelivr.net/npm/vis-data@7.1.9/dist/vis-data.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.6/dist/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0A1628;--cyan:#06B6D4;--cyanDk:#0891B2;--amber:#F59E0B;--red:#EF4444;
  --slate50:#F8FAFC;--slate100:#E2E8F0;--slate600:#64748B;--slate800:#1E293B;
  --white:#FFFFFF;--cardBg:#F0F4F8;--green:#10B981;--purple:#8B5CF6;
  --glow-cyan:0 0 20px rgba(6,182,212,0.15);--glow-purple:0 0 20px rgba(139,92,246,0.15);
  --glow-amber:0 0 20px rgba(245,158,11,0.15);--glow-red:0 0 20px rgba(239,68,68,0.15);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0F172A;color:#E2E8F0;overflow:hidden;height:100vh}

/* ── Background Pattern ── */
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at 20% 50%,rgba(6,182,212,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.04) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,rgba(245,158,11,0.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── Top Bar ── */
.topbar{
  background:linear-gradient(135deg,#0A1628 0%,#0F2B46 50%,#0A1628 100%);
  color:var(--white);padding:0 20px;height:54px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;position:relative;z-index:10;
  border-bottom:1px solid rgba(6,182,212,0.15);box-shadow:0 1px 20px rgba(0,0,0,0.3);
}
.topbar .logo{display:flex;align-items:center;gap:10px}
.topbar .logo .icon{
  width:32px;height:32px;background:linear-gradient(135deg,var(--cyan),var(--cyanDk));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;box-shadow:0 0 15px rgba(6,182,212,0.3);
}
.topbar .logo .name{font-size:17px;font-weight:700;letter-spacing:0.5px}
.topbar .logo .tag{font-size:9px;color:var(--cyan);margin-left:2px;margin-top:3px;opacity:0.8}
.topbar .roles{display:flex;gap:6px;align-items:center}
.topbar .roles select{
  background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.1);padding:6px 10px;border-radius:20px;
  font-size:11px;cursor:pointer;outline:none;margin-right:6px;transition:all 0.2s;
}
.topbar .roles select:hover{border-color:rgba(6,182,212,0.4);color:rgba(255,255,255,0.9)}
.topbar .roles select:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(6,182,212,0.2)}
.topbar .roles select optgroup{font-weight:700;font-size:10px}
.topbar .roles button{
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.08);padding:5px 14px;border-radius:20px;
  font-size:11px;cursor:pointer;transition:all 0.2s;
}
.topbar .roles button:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.2)}
.topbar .roles button.active{
  background:linear-gradient(135deg,var(--cyan),var(--cyanDk));
  color:var(--white);border-color:transparent;font-weight:600;
  box-shadow:0 0 15px rgba(6,182,212,0.3);
}

/* ── Layout ── */
.main{display:flex;height:calc(100vh - 54px);position:relative;z-index:1}
.sidebar{
  width:230px;background:rgba(15,23,42,0.9);border-right:1px solid rgba(6,182,212,0.08);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;backdrop-filter:blur(10px);
}
.sidebar .section{
  padding:10px 16px;font-size:9px;color:rgba(6,182,212,0.6);letter-spacing:2px;
  font-weight:700;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.04);
}
.sidebar .item{
  padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
  font-size:13px;color:rgba(255,255,255,0.55);transition:all 0.2s;
  border-left:3px solid transparent;position:relative;
}
.sidebar .item:hover{background:rgba(6,182,212,0.06);color:rgba(255,255,255,0.85)}
.sidebar .item.active{
  background:rgba(6,182,212,0.1);border-left-color:var(--cyan);
  color:var(--cyan);font-weight:600;box-shadow:inset 0 0 20px rgba(6,182,212,0.04);
}
.sidebar .item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;position:relative}

/* ── Cards ── */
.card{
  background:rgba(15,23,42,0.7);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,0.2);
  backdrop-filter:blur(5px);transition:all 0.3s;
}
.card h2{font-size:20px;margin-bottom:6px;color:#F1F5F9;letter-spacing:0.3px}
.card .subtitle{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:14px}

/* ── KPI Stats ── */
.stat-row{display:flex;gap:14px;flex-wrap:wrap}
.stat-box{
  flex:1;min-width:140px;background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:20px 16px;text-align:center;position:relative;overflow:hidden;
  transition:all 0.3s;cursor:default;
}
.stat-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:0;transition:opacity 0.3s;
}
.stat-box:hover{transform:translateY(-3px);box-shadow:var(--glow-cyan);border-color:rgba(6,182,212,0.2)}
.stat-box:hover::before{opacity:1}
.stat-box .val{
  font-size:34px;font-weight:900;background:linear-gradient(135deg,#06B6D4,#22D3EE);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.2;
}
.stat-box .val.green{background:linear-gradient(135deg,#10B981,#34D399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-box .val.amber{background:linear-gradient(135deg,#F59E0B,#FBBF24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-box .val.purple{background:linear-gradient(135deg,#8B5CF6,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-box .lbl{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px;letter-spacing:0.3px}
.stat-box .trend{font-size:10px;margin-top:3px}
.stat-box .trend.up{color:#10B981}.stat-box .trend.down{color:#EF4444}

/* ── Data Panels ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dash-panel{
  background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:16px;transition:all 0.3s;
}
.dash-panel:hover{border-color:rgba(6,182,212,0.15);box-shadow:var(--glow-cyan)}
.dash-panel .panel-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dash-panel .panel-icon{font-size:20px}
.dash-panel .panel-title{font-size:14px;font-weight:700;color:#F1F5F9}
.dash-panel .panel-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}
.dash-panel .panel-row:last-child{border-bottom:none}
.dash-panel .panel-label{color:rgba(255,255,255,0.45)}
.dash-panel .panel-value{color:#E2E8F0;font-weight:600;font-variant-numeric:tabular-nums}
.dash-panel .panel-value.ok{color:#10B981}.dash-panel .panel-value.warn{color:#F59E0B}.dash-panel .panel-value.bad{color:#EF4444}

/* ── Status Dot ── */
.st-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.st-dot.online{background:#10B981;box-shadow:0 0 6px #10B981;animation:pulse2 2s infinite}
.st-dot.warn{background:#F59E0B;box-shadow:0 0 6px #F59E0B}

/* ── Progress Bar ── */
.prog-bar{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-left:10px}
.prog-bar .fill{height:100%;border-radius:10px;transition:width 0.6s}
.prog-bar .fill.cyan{background:linear-gradient(90deg,#06B6D4,#22D3EE)}
.prog-bar .fill.purple{background:linear-gradient(90deg,#8B5CF6,#A78BFA)}
.prog-bar .fill.green{background:linear-gradient(90deg,#10B981,#34D399)}

@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.5}}

/* ── Graph ── */
.graph-box{width:100%;height:450px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden;background:rgba(10,22,40,0.5)}
.legend{display:flex;gap:16px;margin-top:10px;font-size:10px;color:rgba(255,255,255,0.45);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block}

/* ── Agent Grid ── */
.agent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.agent-card{
  background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:16px;cursor:pointer;transition:all 0.3s;
  position:relative;overflow:hidden;
}
.agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.agent-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3);border-color:rgba(6,182,212,0.2)}
.agent-card.ops::before{background:linear-gradient(90deg,#F59E0B,#FBBF24)}
.agent-card.hse::before{background:linear-gradient(90deg,#EF4444,#F87171)}
.agent-card.biz::before{background:linear-gradient(90deg,#06B6D4,#22D3EE)}
.agent-card.rd::before{background:linear-gradient(90deg,#8B5CF6,#A78BFA)}
.agent-card .ag-icon{font-size:28px;margin-bottom:8px}
.agent-card h4{font-size:14px;margin-bottom:4px;color:#F1F5F9}
.agent-card .ag-domain{font-size:9px;color:rgba(255,255,255,0.35);margin-bottom:6px}
.agent-card p{font-size:10px;color:rgba(255,255,255,0.5);line-height:1.5}

/* ── Ontology Modules ── */
.onto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.onto-mod{
  background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:20px;text-align:center;transition:all 0.3s;
  position:relative;overflow:hidden;
}
.onto-mod::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.onto-mod:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(0,0,0,0.3)}
.onto-mod h4{font-size:15px;margin-bottom:6px;color:#F1F5F9}
.onto-mod .count{font-size:28px;font-weight:900;margin:8px 0}
.onto-mod p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.5}

/* ── Scenario Flow ── */
.flow{display:flex;align-items:center;gap:10px;padding:16px 0;flex-wrap:wrap}
.flow-step{
  flex:1;min-width:110px;text-align:center;background:rgba(15,23,42,0.6);
  border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;transition:all 0.3s;
}
.flow-step:hover{border-color:rgba(6,182,212,0.2);box-shadow:var(--glow-cyan)}
.flow-step .num{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;margin:0 auto 8px;
  background:linear-gradient(135deg,#06B6D4,#0891B2);color:white;
}
.flow-step h4{font-size:12px;margin-bottom:4px;color:#E2E8F0}
.flow-step p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.4}
.flow-arrow{font-size:18px;color:var(--cyan);flex-shrink:0}

/* ── Alert ── */
.alert{
  background:linear-gradient(135deg,#DC2626,#B91C1C);color:var(--white);
  border-radius:10px;padding:16px 20px;display:flex;align-items:center;
  gap:12px;animation:pulse3 2s infinite;box-shadow:0 0 30px rgba(220,38,38,0.3);
}
@keyframes pulse3{0%,100%{opacity:1}50%{opacity:.88}}
.alert .al-icon{font-size:24px}
.alert .al-content{flex:1}
.alert .al-title{font-size:15px;font-weight:700}
.alert .al-detail{font-size:11px;margin-top:4px;opacity:0.9}

/* ── Chat ── */
.chat-box{height:400px;display:flex;flex-direction:column;background:rgba(10,22,40,0.5);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:12px;line-height:1.5;animation:fadeIn 0.3s}
.chat-msg.user{
  align-self:flex-end;background:linear-gradient(135deg,#06B6D4,#0891B2);
  color:white;border-bottom-right-radius:4px;
}
.chat-msg.ai{
  align-self:flex-start;background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.08);
  color:#E2E8F0;border-bottom-left-radius:4px;
}
.chat-msg.sys{align-self:center;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.45);font-size:10px;border-radius:8px;max-width:90%}
.chat-msg .lbl{font-size:9px;margin-bottom:4px;opacity:0.6}
.chat-bar{display:flex;padding:12px;background:rgba(15,23,42,0.6);border-top:1px solid rgba(255,255,255,0.06);gap:8px}
.chat-bar input{
  flex:1;padding:8px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;font-size:12px;outline:none;color:#E2E8F0;transition:all 0.2s;
}
.chat-bar input::placeholder{color:rgba(255,255,255,0.25)}
.chat-bar input:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(6,182,212,0.15)}
.chat-bar button{
  background:linear-gradient(135deg,#06B6D4,#0891B2);color:white;border:none;
  padding:8px 20px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;
  box-shadow:0 0 15px rgba(6,182,212,0.2);transition:all 0.2s;
}
.chat-bar button:hover{box-shadow:0 0 25px rgba(6,182,212,0.35);transform:translateY(-1px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Architecture ── */
.arch-stack{display:flex;flex-direction:column;gap:10px;max-width:750px;margin:0 auto}
.arch-layer{padding:16px 20px;border-radius:10px;text-align:center;font-size:13px}
.arch-layer.l1{background:rgba(10,22,40,0.8);color:#F1F5F9;border:1px solid rgba(255,255,255,0.1)}
.arch-layer.l2{background:rgba(6,182,212,0.15);color:#06B6D4;border:1px solid rgba(6,182,212,0.2)}
.arch-layer.l3{background:rgba(8,145,178,0.15);color:#22D3EE;border:1px solid rgba(8,145,178,0.2)}
.arch-layer.l4{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);border:1px dashed rgba(255,255,255,0.1)}
.arch-layer.l5{background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.05);font-size:11px}

.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.three-col .box{
  background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:20px;text-align:center;transition:all 0.3s;
}
.three-col .box:hover{box-shadow:0 6px 25px rgba(0,0,0,0.3)}
.three-col .box .box-icon{font-size:32px;margin-bottom:8px}
.three-col .box h4{font-size:15px;margin-bottom:8px;color:#E2E8F0}
.three-col .box .tags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.three-col .box .tag{
  font-size:9px;padding:3px 10px;border-radius:12px;
  background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.45);
}

.timeline{margin-top:14px;position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:rgba(6,182,212,0.2)}
.timeline-item{position:relative;margin-bottom:14px;padding-left:16px}
.timeline-item::before{
  content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;
  border-radius:50%;background:var(--cyan);border:2px solid #0F172A;
  box-shadow:0 0 10px rgba(6,182,212,0.4);
}
.timeline-item .t-time{font-size:10px;color:rgba(255,255,255,0.35)}
.timeline-item .t-text{font-size:12px;margin-top:3px;color:rgba(255,255,255,0.6)}

@media(max-width:768px){
  .sidebar{display:none}.agent-grid,.onto-grid,.dash-grid{grid-template-columns:1fr}
  .flow{flex-direction:column}.flow-arrow{transform:rotate(90deg)}
}

/* ── Dashboard Charts ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Bar Chart */
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:70px;font-size:11px;color:rgba(255,255,255,0.6);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(.4,0,.2,1);position:relative}
.bar-fill.cyan{background:linear-gradient(90deg,rgba(6,182,212,.6),rgba(6,182,212,1))}
.bar-fill.green{background:linear-gradient(90deg,rgba(16,185,129,.6),rgba(16,185,129,1))}
.bar-fill.amber{background:linear-gradient(90deg,rgba(245,158,11,.6),rgba(245,158,11,1))}
.bar-fill.purple{background:linear-gradient(90deg,rgba(139,92,246,.6),rgba(139,92,246,1))}
.bar-fill.red{background:linear-gradient(90deg,rgba(239,68,68,.6),rgba(239,68,68,1))}
.bar-val{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:white;text-shadow:0 1px 2px rgba(0,0,0,.3)}

/* Radial Gauge */
.gauge-group{display:flex;justify-content:space-around;gap:12px;flex-wrap:wrap}
.gauge{text-align:center;position:relative}
.gauge svg{display:block;margin:0 auto}
.gauge .g-val{font-size:24px;font-weight:900;fill:#F1F5F9}
.gauge .g-lbl{font-size:10px;color:rgba(255,255,255,0.45);margin-top:4px}
.gauge .g-unit{font-size:11px;fill:rgba(255,255,255,0.5)}

/* Comparison Bars */
.comp-chart{display:flex;align-items:flex-end;gap:20px;height:150px;padding:0 10px}
.comp-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.comp-bar{width:100%;max-width:60px;border-radius:6px 6px 0 0;transition:height 0.8s cubic-bezier(.4,0,.2,1);position:relative;min-height:4px}
.comp-val{font-size:13px;font-weight:800;color:#F1F5F9}
.comp-lbl{font-size:10px;color:rgba(255,255,255,0.45);text-align:center}
.comp-tag{font-size:9px;padding:1px 6px;border-radius:8px;margin-top:2px}
.comp-tag.up{color:#10B981;background:rgba(16,185,129,0.1)}
.comp-tag.down{color:#EF4444;background:rgba(239,68,68,0.1)}

/* Mini sparkline indicator */
.spark-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.spark-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.spark-dot.on{background:#10B981;box-shadow:0 0 8px rgba(16,185,129,.4)}
.spark-dot.warn{background:#F59E0B;box-shadow:0 0 8px rgba(245,158,11,.4)}
.spark-info{font-size:11px;color:rgba(255,255,255,0.6);flex:1}
.spark-val{font-size:11px;font-weight:700;color:#E2E8F0}

/* Info card row */
.info-ribbon{display:flex;gap:10px;flex-wrap:wrap}

  currentRole = e.target.dataset.role;
  // Sync role select dropdown

  if (rs) rs.value = currentRole;
  render(currentView);
});
function switchDept(val) {
  currentDept = val;

}
function switchRole(val) {
  currentRole = val;

function render(view) {
  currentView = view;
  const c = document.getElementById('content');
  document.querySelectorAll('.sidebar .item').forEach(el=>el.classList.remove('active'));
  const target = document.querySelector(`[data-view="${view}"]`);
  if (target) target.classList.add('active');
  const fn = {
    overview, ontology, agents, 'scene-furnace':sceneFurnace,
    'scene-quality':sceneQuality, 'scene-profit':sceneProfit,
    'scene-safety':sceneSafety, 'scene-rd':sceneRD, arch, chat, echartsView
  }[view];
  if (fn) fn(c);
}

// ── Scene Helper ──
function advanceScene(key, steps) {
  if (!sceneStep[key]) sceneStep[key] = 0;
  if (sceneStep[key] >= steps.length) { sceneStep[key] = 0; render(`scene-${key}`); return; }
  const s = steps[sceneStep[key]];
  const contentEl = document.getElementById(key+'Content');
  const btnEl = document.getElementById(key+'Btn');
  const alertEl = document.getElementById(key+'Alert');
  if (s.alert !== undefined && alertEl) {
    alertEl.style.display = s.alert ? 'flex' : 'none';
    if (s.alert) {
      document.getElementById(key+'Title').textContent = s.title||'';
      document.getElementById(key+'Detail').textContent = s.detail||'';
    }
  }
  if (contentEl) contentEl.innerHTML = s.html||'';
  if (btnEl) btnEl.textContent = sceneStep[key] < steps.length - 1 ? '▶ 下一步' : '🔄 重新演示';
  sceneStep[key]++;
}
